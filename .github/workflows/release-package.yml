name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm 11 (required for OIDC trusted publishing)
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ── Preferred: npm Trusted Publishing (OIDC, no long-lived token) ──────────
      # Provenance attestation is generated automatically.
      # Requires one-time setup on npmjs.com before the first automated publish:
      #   npmjs.com → @dooph-software/design-system → Settings → Trusted publishers
      #   → Add publisher → GitHub Actions
      #   → Org: dooph-software  Repo: dooph-Design-System  Workflow: release-package.yml
      # The package must already exist on npm before trusted publishing can be configured.
      # For the very first publish, use the TOKEN FALLBACK below, then switch here.
      - name: Publish to npm (OIDC)
        run: npm publish --access public
      # No NODE_AUTH_TOKEN needed — npm CLI detects the OIDC environment automatically.
